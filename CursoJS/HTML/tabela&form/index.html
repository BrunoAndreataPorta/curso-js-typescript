<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table td, table th {
            border: solid 2px;
            padding: 5px;
            text-align: left;
        }

        table {
            border-collapse: collapse;
            width: 800px;
        }

        body{
            font-family: sans-serif;
        }

        table caption {
            caption-side: bottom;
            text-align: right;
            font-style: italic;
            font-size: 14px;
            margin: 5px 0;
        }

        tfoot td, table th {
            background-color: #ddd;
        }

        tfoot td{
            font-style: italic;
        }

        .responsive-table {
            max-width: 100%;
            overflow-x: auto;
        }

        label{
            cursor: pointer;
            display: block;
        }

    </style>
</head>
<body>
    <div class="responsive-table">
        <table>
            <caption>Uma descrição para essa tabela</caption>
            <thead>
                <tr>
                    <th>Título 1</th>
                    <th>Título 2</th>
                    <th>Título 3</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Corpo 1</td>
                    <td>Corpo 2</td>
                    <td>Corpo 3</td>
                </tr>
                <tr>
                    <td colspan="2">Corpo 1&2</td>
                    <td>Corpo 3</td>
                </tr>
                <tr>
                    <td>Corpo 1</td>
                    <td>Corpo 2</td>
                    <td>Corpo 3</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="2" rowspan="2"></td>
                    <td>Total:</td>
                </tr>
                <tr>
                    <td>R$555</td>
                </tr>
            </tfoot>
        </table>
    </div>
    <form action="#" method="get" 
    target="_blank" autocomplete="off">
        <p>O meu formulário</p>
        <p>
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" 
            placeholder="Seu nome">
        </p>
        <p>
            <label for="dev">Sou um dev</label>
            <input type="checkbox" name="dev" id="dev" value="sim">
        </p>
        <p>
            Gênero:<br>
            <label for="feminino">Feminino:</label>
            <input type="radio" name="genero" id="feminino" 
            value="feminio">
            <label for="masculino">Masculino:</label>
            <input type="radio" name="genero" id="masculino" 
            value="masculino">
            <label for="outro">Prefiro não dizer:</label>
            <input type="radio" name="genero" id="outro" 
            value="outro">
        </p>

        <p>
            <label for="date">Data:</label>
            <input type="date" name="date" id="date">
        </p>

        <p>
            <label for="datetime">Data:</label>
            <input type="datetime-local" name="datetime" 
            id="datetime" value="2026-02-20T20:00">
        </p>

        <p>
            <label for="time">Data:</label>
            <input type="time" name="time" 
            id="time" value="20:00:01">
        </p>

        <p>
            <label for="cor">Cor preferida:</label>
            <input type="color" name="cor" id="cor"
            value="#FF0000">
        </p>

        <p>
            <label for="email">Seu e-mail:</label>
            <input type="email" name="email" id="email"
            placeholder="ex.: email@email.com">
        </p>

        <p>
            <label for="file">Sua foto:</label>
            <input type="file" name="file" id="file"
            accept=".png">
        </p>

        <p>
            <label for="number">Numero:</label>
            <input type="number" name="number" id="number"
            placeholder="Digite um número" min="10" max="50">
        </p>

        <p>
            <label for="password">Senha:</label>
            <input type="password" name="password" id="password"
            placeholder="Digite sua senha">
        </p>

        <p>
            <label for="range">Range:</label>
            <input type="range" name="range" id="range"
            list="tickmarks">

            <datalist id ="tickmarks">
                <option value="0" label="0%">
                <option value="10">
                <option value="20">
                <option value="30">
                <option value="40">
                <option value="50" label="50%">
                <option value="60">
                <option value="70">
                <option value="80">
                <option value="90">
                <option value="100" label="100%">
                </option>
            </datalist>
        </p>

        <p>
            <label for="url">Sua URL:</label>
            <input type="url" name="url" id="url"
            placeholder="URL">
        </p>

        <p>
            <label for="search">Sua URL:</label>
            <input type="search" name="search" id="search"
            placeholder="search">
        </p>

        <p>
            <label for="select">Selecione alguma opção:</label>
            <select name="select" id="select">
                <optgroup label="Teste">
                    <option value="qualquer1" selected>V1</option>
                    <option value="qualquer2">V2</option>
                    <option value="qualquer3">V3</option>
                </optgroup>
            </select>
        </p>

        <p>
            <label for="textarea">textarea:</label>
            <textarea name="textarea" id="textarea"
            rows="3" cols="9">

            </textarea>
        </p>

        <p>
            <button type="submit">Enviar</button>
            <button type="reset">Reset</button>
        </p>

    </form>
</body>
</html>
